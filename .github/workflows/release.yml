name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build the fat JAR once on Linux
  # ─────────────────────────────────────────
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Fetch full history so we can push version.xml back to main
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Generate version.xml via update4j
        # Uses GenerateConfig.java (compiled into the fat JAR) so that
        # the checksum is CRC32 and the path is ${user.home}/.logiclab/LogicLab.jar
        run: java -cp target/LogicLab.jar SourceCode.GenerateConfig target/LogicLab.jar

      - name: Commit and push version.xml to main
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add version.xml
          git commit -m "chore: update version.xml for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR + version.xml artifact
        uses: actions/upload-artifact@v5
        with:
          name: LogicLab-jar
          path: |
            target/LogicLab.jar
            version.xml

  # ─────────────────────────────────────────
  # Job 2: Build native installers (matrix)
  # ─────────────────────────────────────────
  build-installers:
    needs: build-jar
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
            ext: exe
            icon: src/main/resources/Logo.ico
          - os: macos-latest
            type: dmg
            ext: dmg
            icon: src/main/resources/LogicLab_icon.icns
          - os: ubuntu-latest
            type: deb
            ext: deb
            icon: src/main/resources/LogicLab_icon.png

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download JAR artifact
        uses: actions/download-artifact@v5
        with:
          name: LogicLab-jar
          path: ./

      - name: Prepare jpackage input
        shell: bash
        run: |
          mkdir -p jpackage-input
          mv target/LogicLab.jar jpackage-input/

      - name: Build installer with jpackage
        shell: bash
        run: |
          mkdir -p installer-output
          jpackage \
            --input jpackage-input/ \
            --name LogicLab \
            --main-jar LogicLab.jar \
            --main-class SourceCode.Launcher \
            --type ${{ matrix.type }} \
            --app-version ${GITHUB_REF_NAME#v} \
            --dest installer-output \
            --icon ${{ matrix.icon }} \
            --vendor "LogicLab" \
            --description "LogicLab - Java Programming Challenges" \
            ${{ matrix.os == 'windows-latest' && '--win-dir-chooser --win-shortcut --win-menu --win-menu-group LogicLab' || '' }}

      - name: Rename installer to remove version number
        shell: bash
        run: |
          cd installer-output
          for f in *; do
            ext="${f##*.}"
            mv "$f" "LogicLab.$ext" 2>/dev/null || true
          done

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: installer-${{ matrix.os }}
          path: installer-output/*.${{ matrix.ext }}

  # ─────────────────────────────────────────
  # Job 3: Publish GitHub Release with all files
  # ─────────────────────────────────────────
  publish-release:
    needs: build-installers
    runs-on: ubuntu-latest

    steps:
      - name: Download JAR + version.xml
        uses: actions/download-artifact@v5
        with:
          name: LogicLab-jar
          path: release-files/

      - name: Download Windows installer
        uses: actions/download-artifact@v5
        with:
          name: installer-windows-latest
          path: release-files/

      - name: Download macOS installer
        uses: actions/download-artifact@v5
        with:
          name: installer-macos-latest
          path: release-files/

      - name: Download Linux installer
        uses: actions/download-artifact@v5
        with:
          name: installer-ubuntu-latest
          path: release-files/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release (if it doesn't exist)
          gh release create v1.1.5 --title "Release v1.1.5" --generate-notes || echo "Release already exists"
          
          # Upload files one by one, overwriting any existing ones
          for file in release-files/*; do
            echo "Uploading $file..."
            gh release upload v1.1.5 "$file" --clobber
          done