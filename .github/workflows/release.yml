name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Generate version.xml
        run: |
          VERSION=${GITHUB_REF_NAME}
          CHECKSUM=$(sha256sum target/LogicLab.jar | awk '{print $1}')
          SIZE=$(stat -c%s target/LogicLab.jar)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/"

          cat > version.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration timestamp="${TIMESTAMP}">
              <base uri="${BASE_URL}"/>
              <files>
                  <file path="LogicLab.jar" size="${SIZE}" checksum="${CHECKSUM}" uri="LogicLab.jar"/>
              </files>
          </configuration>
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/LogicLab.jar
            version.xml
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}