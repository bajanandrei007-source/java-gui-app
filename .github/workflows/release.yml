name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─────────────────────────────────────────
  # Job 1: Build the fat JAR once on Linux
  # ─────────────────────────────────────────
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Generate version.xml
        run: |
          VERSION=${GITHUB_REF_NAME}
          CHECKSUM=$(sha256sum target/LogicLab.jar | awk '{print $1}')
          SIZE=$(stat -c%s target/LogicLab.jar)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S")
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/"

          cat > version.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <configuration timestamp="${TIMESTAMP}">
              <base uri="${BASE_URL}"/>
              <files>
                  <file path="LogicLab.jar" size="${SIZE}" checksum="${CHECKSUM}" uri="LogicLab.jar"/>
              </files>
          </configuration>
          EOF

      - name: Prepare clean jpackage input
        run: |
          mkdir -p jpackage-input
          cp target/LogicLab.jar jpackage-input/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogicLab-jar
          path: |
            jpackage-input/LogicLab.jar
            version.xml

  # ─────────────────────────────────────────
  # Job 2: Build native installers (matrix)
  # ─────────────────────────────────────────
  build-installers:
    needs: build-jar
    strategy:
      matrix:
        include:
          - os: windows-latest
            type: exe
            ext: exe
            icon: src/main/resources/LogicLab_icon.ico
          - os: macos-latest
            type: dmg
            ext: dmg
            icon: src/main/resources/LogicLab_icon.png
          - os: ubuntu-latest
            type: deb
            ext: deb
            icon: src/main/resources/LogicLab_icon.png

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: LogicLab-jar
          path: jpackage-input/

      - name: Build installer with jpackage
        shell: bash
        run: |
          mkdir -p installer-output
          jpackage \
            --input jpackage-input/ \
            --name LogicLab \
            --main-jar LogicLab.jar \
            --main-class SourceCode.Launcher \
            --type ${{ matrix.type }} \
            --app-version ${GITHUB_REF_NAME#v} \
            --dest installer-output \
            --icon ${{ matrix.icon }} \
            --vendor "LogicLab" \
            --description "LogicLab - Java Programming Challenges"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: installer-output/*.${{ matrix.ext }}

  # ─────────────────────────────────────────
  # Job 3: Publish GitHub Release with all files
  # ─────────────────────────────────────────
  publish-release:
    needs: build-installers
    runs-on: ubuntu-latest

    steps:
      - name: Download JAR + version.xml
        uses: actions/download-artifact@v4
        with:
          name: LogicLab-jar
          path: release-files/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows-latest
          path: release-files/

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-macos-latest
          path: release-files/

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: installer-ubuntu-latest
          path: release-files/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}